spring.application.name=stock-api

# H2 in-memory database (swap for PostgreSQL in production)
spring.datasource.url=jdbc:h2:mem:stockdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# JWT secret — override via environment variable in production
jwt.secret=${JWT_SECRET:dev-secret-change-in-production-min32}
jwt.expiration-ms=2592000000
