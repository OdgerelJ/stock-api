spring.application.name=stock-api

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/stockdb}
spring.datasource.username=${DB_USER:odgereljamsranjav}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:5}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Flyway manages schema migrations
spring.flyway.enabled=true
# Baseline existing schemas (safe for first deploy against a pre-existing database)
spring.flyway.baseline-on-migrate=true

# JWT — override JWT_SECRET and JWT_EXPIRATION_MS in production
jwt.secret=${JWT_SECRET:dev-secret-change-in-production-min32}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Actuator — expose only the health endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# CORS — comma-separated list of allowed origins
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# OpenAPI / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
